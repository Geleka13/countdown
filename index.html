<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Countdown <i>[BETA]</i></h1>
    <h3>Timer até vários eventos de 2026!
        (Projeto inacabado) <br>
        <i>Script feito com a ajuda de IA</i>
    </h3>

    <div id="copa" class="timer">
        <h3>Abertura da Copa do Mundo</h3>
        <div class="countdown">
            <div class="tempo">
                <span id="days">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="tempo">
                <span id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="tempo">
                <span id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="tempo">
                <span id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
        <a href="worldcup/index.html">VER MAIS</a>
    </div>

    <div id="natal" class="timer">
        <h3>Natal</h3>
        <div class="countdown">
            <div class="tempo">
                <span id="days">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="tempo">
                <span id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="tempo">
                <span id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="tempo">
                <span id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
        <a href="christmas">VER MAIS</a>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
